<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Giddel Consult — Outstanding Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#2176C7;--dark-blue:#1558A0;--light-blue:#E8F2FC;--black:#1A1A1A;--grey:#6B6B6B;--light-grey:#F4F6F9;--red:#C0392B;--green:#1A7A4A;--border:#DDE3ED}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--light-grey);color:var(--black);min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d2d52 0%,#1558A0 50%,#2176C7 100%);padding:20px}
.login-card{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,0.25)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{height:54px;object-fit:contain}
.login-divider{border:none;border-top:2px solid var(--light-blue);margin:16px 0}
.login-subtitle{text-align:center;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--grey);text-transform:uppercase;margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;font-weight:700;letter-spacing:0.5px;color:var(--grey);margin-bottom:6px;text-transform:uppercase}
.login-field input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:'Barlow',sans-serif;color:var(--black);background:#fff;outline:none;transition:border-color 0.2s}
.login-field input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;margin-top:6px;transition:background 0.2s}
.login-btn:hover{background:var(--dark-blue)}
.login-error{background:#FDECEA;color:var(--red);font-size:13px;font-weight:600;padding:10px 14px;border-radius:7px;margin-top:10px;display:none;text-align:center}
#app{display:none;min-height:100vh}
.header{background:#fff;border-bottom:3px solid var(--blue);padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(33,118,199,0.08)}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.header-brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.header-brand img{height:38px;object-fit:contain}
.header-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--grey);border-left:2px solid var(--blue);padding-left:10px;line-height:1.4;text-transform:uppercase}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:9px 18px;border-radius:7px;font-weight:700;font-size:13px;font-family:'Barlow',sans-serif;cursor:pointer;transition:background 0.2s}
.btn-primary:hover{background:var(--dark-blue)}
.btn-back{background:#fff;color:var(--blue);border:1.5px solid var(--blue);padding:8px 16px;border-radius:7px;font-weight:600;font-size:13px;font-family:'Barlow',sans-serif;cursor:pointer}
.btn-logout{background:none;border:1.5px solid var(--border);color:var(--grey);padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;font-family:'Barlow',sans-serif;cursor:pointer}
.main{max-width:1100px;margin:0 auto;padding:24px 16px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.stat-card{border-radius:10px;padding:16px 18px;border:1.5px solid transparent}
.stat-label{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;line-height:1}
.banner{background:linear-gradient(135deg,var(--blue),var(--dark-blue));border-radius:10px;padding:16px 22px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.banner-label{color:rgba(255,255,255,0.75);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.banner-value{color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800}
.filters{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.filter-input{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:14px;font-family:'Barlow',sans-serif;color:var(--black);outline:none;max-width:200px}
.filter-actions{margin-left:auto;display:flex;gap:8px}
.btn-export{padding:9px 14px;border:1.5px solid var(--blue);color:var(--blue);background:#fff;border-radius:7px;font-size:12px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer}
.btn-word{padding:9px 14px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer}
.btn-clear-dates{padding:9px 12px;border:1.5px solid var(--border);color:var(--grey);background:#fff;border-radius:7px;font-size:12px;font-weight:600;font-family:'Barlow',sans-serif;cursor:pointer;white-space:nowrap}
.btn-clear-dates:hover{border-color:var(--red);color:var(--red)}
.table-wrap{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--blue)}
thead th{padding:11px 14px;text-align:left;color:#fff;font-weight:700;font-size:11px;letter-spacing:0.5px;white-space:nowrap}
thead th.right{text-align:right}
tbody tr{border-bottom:1px solid #EEF0F4}
tbody tr:nth-child(even){background:var(--light-grey)}
tbody td{padding:11px 14px;color:var(--black);vertical-align:middle}
tbody td.right{text-align:right}
tbody td.grey{color:var(--grey)}
.type-badge{font-size:10px;font-weight:700;background:var(--light-blue);color:var(--blue);padding:2px 7px;border-radius:4px;margin-right:5px}
.status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.status-owing{background:#FDECEA;color:var(--red)}
.status-cleared{background:#D4EDDA;color:var(--green)}
.action-btns{display:flex;gap:6px}
.btn-edit{padding:5px 10px;background:var(--light-blue);color:var(--blue);border:none;border-radius:5px;font-size:11px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer}
.btn-del{padding:5px 10px;background:#FDECEA;color:var(--red);border:none;border-radius:5px;font-size:11px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer}
.table-footer{padding:10px 14px;border-top:1px solid #EEF0F4;font-size:12px;color:var(--grey)}
.empty-state{background:#fff;border-radius:10px;padding:60px 20px;text-align:center;color:var(--grey)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:700}
.empty-sub{font-size:13px;margin-top:4px}
.form-card{background:#fff;border-radius:12px;padding:28px;max-width:680px;box-shadow:0 2px 12px rgba(33,118,199,0.08)}
.form-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--black);margin-bottom:4px}
.form-sub{font-size:13px;color:var(--grey);margin-bottom:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:700;letter-spacing:0.4px;color:var(--grey);margin-bottom:5px;text-transform:uppercase}
.form-input{padding:12px 13px;border:1.5px solid var(--border);border-radius:7px;font-size:16px;font-family:'Barlow',sans-serif;color:var(--black);background:#fff;outline:none;transition:border-color 0.2s;width:100%}
.form-input:focus{border-color:var(--blue)}
textarea.form-input{resize:vertical;font-size:15px}
.form-actions{display:flex;gap:10px;margin-top:24px}
.btn-save{flex:1;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:15px;font-family:'Barlow',sans-serif;cursor:pointer;transition:background 0.2s}
.btn-save:hover{background:var(--dark-blue)}
.btn-cancel{padding:14px 20px;border:1.5px solid var(--border);background:#fff;border-radius:8px;font-weight:600;font-size:14px;font-family:'Barlow',sans-serif;color:var(--grey);cursor:pointer}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;max-width:360px;width:100%;text-align:center}
.modal-title{font-size:16px;font-weight:800;margin-bottom:8px}
.modal-sub{font-size:13px;color:var(--grey);margin-bottom:24px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.btn-confirm-del{padding:10px 22px;background:var(--red);color:#fff;border:none;border-radius:7px;font-weight:700;font-size:13px;font-family:'Barlow',sans-serif;cursor:pointer}
.btn-cancel-del{padding:10px 22px;border:1.5px solid var(--border);background:#fff;border-radius:7px;font-weight:600;font-size:13px;font-family:'Barlow',sans-serif;cursor:pointer;color:var(--grey)}
.toast{position:fixed;bottom:24px;right:24px;padding:13px 20px;border-radius:9px;font-size:14px;font-weight:700;color:#fff;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.15);opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:4px solid var(--light-blue);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;font-weight:700;color:var(--blue)}
@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .stats-grid .stat-card:last-child{grid-column:1/-1}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .filter-actions{margin-left:0;width:100%;justify-content:space-between}
  .header-inner{height:54px}
}
</style>
</head>

// ===== SUPABASE API =====
async function sbFetch(method, path, body){
  const res = await fetch(SUPABASE_URL+"/rest/v1/"+path, {
    method,
    headers:{
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer "+SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": method==="POST" ? "return=representation" : "return=representation"
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok){
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function dbGetAll(){ return await sbFetch("GET", TABLE+"?order=created_at.desc&select=*"); }
async function dbInsert(r){ return await sbFetch("POST", TABLE, r); }
async function dbUpdate(id,r){ return await sbFetch("PATCH", TABLE+"?id=eq."+id, r); }
async function dbDelete(id){ return await sbFetch("DELETE", TABLE+"?id=eq."+id); }

// ===== AUTH =====
function doLogin(){
  const u=document.getElementById("username-input").value.trim();
  const p=document.getElementById("password-input").value;
  if(u===CREDS.username && p===CREDS.password){
    sessionStorage.setItem(SESSION_KEY,"1");
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    initApp();
  } else {
    document.getElementById("login-error").style.display="block";
  }
}

function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById("app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("username-input").value="";
  document.getElementById("password-input").value="";
  document.getElementById("login-error").style.display="none";
}

document.addEventListener("keydown",function(e){
  if(e.key==="Enter" && document.getElementById("login-screen").style.display!=="none") doLogin();
});

window.onload=function(){
  if(sessionStorage.getItem(SESSION_KEY)==="1"){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    initApp();
  }
};

function hideLoading(){ document.getElementById("loading-overlay").classList.remove("show"); }

async function initApp(){
  showLoading("Loading records...");

    // ensure table has right columns by attempting to read
    records = await dbGetAll();

// ===== FORMATTING =====
function formatNaira(val){
  if(!val && val!==0) return "—";
  const n=parseFloat(String(val).replace(/,/g,""));
  if(isNaN(n)) return val||"—";
  return "\u20A6"+n.toLocaleString("en-NG",{minimumFractionDigits:2,maximumFractionDigits:2});
}

function formatDate(d){
  if(!d) return "—";
  const dt=new Date(d+"T00:00:00");
  return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

function autoComma(el){
  const pos=el.selectionStart;
  const raw=el.value.replace(/[^0-9.]/g,"");
  const parts=raw.split(".");
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,",");
  const formatted=parts.length>1?parts[0]+"."+parts[1]:parts[0];
  const diff=formatted.length-el.value.length;
  el.value=formatted;
  try{el.setSelectionRange(pos+diff,pos+diff);}catch(e){}
}

// ===== STATS =====
function renderStats(){
  const owing=records.filter(r=>r.status==="Owing");
  const cleared=records.filter(r=>r.status==="Cleared");
  document.getElementById("stat-total").textContent=records.length;
  document.getElementById("stat-owing").textContent=owing.length;
  document.getElementById("stat-cleared").textContent=cleared.length;
  const totalOwing=owing.reduce((s,r)=>s+(parseFloat(String(r.outstanding||"0").replace(/,/g,""))||0),0);
  const banner=document.getElementById("outstanding-banner");
  if(owing.length>0){
    banner.style.display="flex";
    document.getElementById("banner-amount").textContent=formatNaira(totalOwing);
  } else { banner.style.display="none"; }
}

function buildClientFilter(){
  const sel=document.getElementById("filter-client");
  const clients=[...new Set(records.map(r=>r.client))].filter(Boolean).sort();
  const current=sel.value;
  sel.innerHTML='<option value="">All Clients</option>';
  clients.forEach(c=>{
    const o=document.createElement("option");
    o.value=c; o.textContent=c;
    if(c===current) o.selected=true;
    sel.appendChild(o);
  });
}

// ===== TABLE =====
function getFiltered(){
  const search=document.getElementById("search-input").value.toLowerCase();
  const client=document.getElementById("filter-client").value;
  const status=document.getElementById("filter-status").value;
  const from=document.getElementById("filter-from").value;
  const to=document.getElementById("filter-to").value;
  return records.filter(r=>{
    const ms=!search||r.client.toLowerCase().includes(search)||(r.vessel_name||"").toLowerCase().includes(search)||(r.invoice_numbers||"").toLowerCase().includes(search);
    const mc=!client||r.client===client;
    const mst=!status||r.status===status;
    const mf=!from||r.operation_date>=from;
    const mt=!to||r.operation_date<=to;
    return ms&&mc&&mst&&mf&&mt;
  });
}

function clearDates(){
  document.getElementById("filter-from").value="";
  document.getElementById("filter-to").value="";
  renderTable();
}

function escH(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderTable(){
  const filtered=getFiltered();
  const container=document.getElementById("table-container");
  if(filtered.length===0){
    container.innerHTML='<div class="empty-state"><div class="empty-icon">&#128203;</div><div class="empty-title">No records found</div><div class="empty-sub">Add your first record using the button above</div></div>';
    return;
  }
  const rows=filtered.map((r,i)=>{
    const bg=i%2===0?"#fff":"#F4F6F9";
    const outColor=r.status==="Cleared"?"#1A7A4A":"#C0392B";
    const outVal=r.status==="Cleared"?"—":formatNaira(r.outstanding);
    return `<tr style="background:${bg}">
      <td style="font-weight:700">${escH(r.client)}</td>
      <td class="grey">${escH(r.invoice_numbers||"—")}</td>
      <td><span class="type-badge">${escH(r.operation_type)}</span>${escH(r.vessel_name||"")}</td>
      <td class="grey" style="white-space:nowrap">${formatDate(r.operation_date)}</td>
      <td class="right" style="font-weight:600">${formatNaira(r.total_invoice)}</td>
      <td class="right grey">${formatNaira(r.amount_paid)}</td>
      <td class="right" style="font-weight:700;color:${outColor}">${outVal}</td>
      <td><span class="status-badge ${r.status==="Cleared"?"status-cleared":"status-owing"}">${r.status}</span></td>
      <td><div class="action-btns">
        <button class="btn-edit" onclick="openEdit('${r.id}')">Edit</button>
        <button class="btn-del" onclick="openDelete('${r.id}')">Del</button>
      </div></td>
    </tr>`;
  }).join("");
  container.innerHTML=`<div class="table-wrap"><table>
    <thead><tr>
      <th>Client</th><th>Invoice No(s)</th><th>Operation</th><th>Date</th>
      <th class="right">Total Invoice</th><th class="right">Paid</th>
      <th class="right">Outstanding</th><th>Status</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="table-footer">Showing ${filtered.length} of ${records.length} records</div>
  </div>`;
}

// ===== VIEWS =====
function showDashboard(){
  document.getElementById("dashboard-view").style.display="block";
  document.getElementById("form-view").style.display="none";
  document.getElementById("new-record-btn").style.display="inline-block";
  document.getElementById("back-btn").style.display="none";
  editingId=null;
  renderStats();
  renderTable();
  buildClientFilter();
}

function showForm(){
  document.getElementById("dashboard-view").style.display="none";
  document.getElementById("form-view").style.display="block";
  document.getElementById("new-record-btn").style.display="none";
  document.getElementById("back-btn").style.display="inline-block";
  window.scrollTo(0,0);
}

function openAdd(){
  editingId=null;
  document.getElementById("form-title").textContent="Add New Record";
  document.getElementById("save-btn").textContent="Save Record";
  clearForm();
  showForm();
}

function openEdit(id){
  const r=records.find(x=>x.id===id);
  if(!r) return;
  editingId=id;
  document.getElementById("form-title").textContent="Edit Record";
  document.getElementById("save-btn").textContent="Update Record";
  document.getElementById("f-client").value=r.client||"";
  document.getElementById("f-invoice").value=r.invoice_numbers||"";
  document.getElementById("f-date").value=r.operation_date||"";
  document.getElementById("f-type").value=r.operation_type||"Vessel";
  document.getElementById("f-vessel").value=r.vessel_name||"";
  document.getElementById("f-total").value=r.total_invoice||"";
  document.getElementById("f-paid").value=r.amount_paid||"";
  document.getElementById("f-outstanding").value=r.outstanding||"";
  document.getElementById("f-status").value=r.status||"Owing";
  document.getElementById("f-notes").value=r.notes||"";
  toggleVessel();
  showForm();
}

function clearForm(){
  ["f-client","f-invoice","f-date","f-vessel","f-total","f-paid","f-outstanding","f-notes"].forEach(id=>{
    document.getElementById(id).value="";
  });
  document.getElementById("f-type").value="Vessel";
  document.getElementById("f-status").value="Owing";
  toggleVessel();
}

function toggleVessel(){
  const t=document.getElementById("f-type").value;
  document.getElementById("vessel-group").style.display=t==="Vessel"?"flex":"none";
}

// ===== SAVE =====
async function saveRecord(){
  const client=document.getElementById("f-client").value.trim();
  const date=document.getElementById("f-date").value;
  const total=document.getElementById("f-total").value.trim();
  if(!client||!date||!total){ showToast("Please fill in Client, Date and Total Invoice.","error"); return; }
  const rec={
    client,
    invoice_numbers:document.getElementById("f-invoice").value.trim(),
    operation_date:date,
    operation_type:document.getElementById("f-type").value,
    vessel_name:document.getElementById("f-vessel").value.trim(),
    total_invoice:total,
    amount_paid:document.getElementById("f-paid").value.trim(),
    outstanding:document.getElementById("f-outstanding").value.trim(),
    status:document.getElementById("f-status").value,
    notes:document.getElementById("f-notes").value.trim()
  };
  showLoading(editingId?"Updating record...":"Saving record...");
  try{
    if(editingId){
      await dbUpdate(editingId, rec);
      showToast("Record updated.");
    } else {
      await dbInsert(rec);
      showToast("Record saved.");
    }
    records = await dbGetAll();
  } catch(e){
    console.error(e);
    showToast("Error saving. Check connection.","error");
  }
  hideLoading();
  showDashboard();
}

// ===== DELETE =====
function openDelete(id){ deleteId=id; document.getElementById("delete-modal").classList.add("show"); }
function closeDeleteModal(){ deleteId=null; document.getElementById("delete-modal").classList.remove("show"); }

async function confirmDelete(){
  closeDeleteModal();
  showLoading("Deleting...");
  try{
    await dbDelete(deleteId);
    records=records.filter(r=>r.id!==deleteId);
    showToast("Record deleted.");
  } catch(e){
    showToast("Error deleting.","error");
  }
  hideLoading();
  showDashboard();
}

// ===== EXPORT CSV =====
function exportCSV(){
  const filtered=getFiltered();
  const header=["Client","Invoice No(s)","Type","Vessel","Date","Total Invoice","Amount Paid","Outstanding","Status","Notes"];
  const rows=filtered.map(r=>[r.client,r.invoice_numbers||"",r.operation_type,r.vessel_name||"",formatDate(r.operation_date),r.total_invoice||"",r.amount_paid||"",r.outstanding||"",r.status,r.notes||""]);
  const csv=[header,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`Giddel_Outstandings_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast("CSV exported.");
}

// ===== TOAST =====
function showToast(msg,type="success"){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show "+type;
  setTimeout(()=>{ t.className="toast"; },3000);
}
